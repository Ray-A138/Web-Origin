<!DOCTYPE html>
<html>

<head>
 <meta charset="utf-8">
    <title>せりふのはきだめ</title>
    <link rel="stylesheet" href="./lines_pagestyle.css">
</head>

</body>
    <div id = "title">せりふのはきだめ</div>
    <hr>
<div class="intro">
    <p>ほら、はやく書きましょうよ、忘れちゃいますよ！<br>思いついたら書くんです！<br></p>
</div>
    <p><div id="attention">Attention!</div>
    <div id="attentionsentence">右下の斜め線をドラッグすると入力欄が大きくなります
<br>改行も入力できます
<br>「追加ッッッ」ボタンで追加できます
<br>「やっぱなし」ボタンを押すと書いたものが消せますが履歴は残りません</div>
</div>
<hr>

<div class="input-area">

  <textarea id="newlines" type="text" placeholder="なんか思いついたか？"></textarea>
  <button id="addButton" onclick="AddPressed()">追加ッッッ</button>
</div>

<table id="result"></table>

<script>
let tasks =[];
function AddPressed() {
  const newlines = document.getElementById('newlines');
  //no tasks
  if (newlines.value === '') {
    return;
  }
  //add task
  tasks.push(newlines.value);
  //clear input
  newlines.value = '';
  //redraw
  draw();

}

function draw() {
  let result = '';



  for (let i = 0; i < tasks.length; i++) {
    //change \n to <br> for display
    tasks[i] = tasks[i].replace(/\n/g, "<br>");
    result += "<tr>\n" + 
              `<td id="taskElement">${tasks[i]}</td>\n` + 
              `<td><button id="deleteButton" onclick="deletelines(${i})">やっぱなし</button></td>\n` + 
              "</tr>";
  }
  
  document.getElementById('result').innerHTML = result;}

function deletelines(index) {
  tasks.splice(index, 1);
  draw();
}
</script>

  <footer>

</body>

</html>
